appId: com.atlas.os
productName: Atlas OS

directories:
  output: release

files:
  - out/**/*
  - package.json

# Drizzle SQL migrations are read at runtime from resources/drizzle (see paths.ts).
extraResources:
  - from: drizzle
    to: drizzle
    filter:
      - "**/*"

# Native module + the Agent SDK's bundled CLI must live outside the asar so they
# can be loaded/spawned at runtime.
asarUnpack:
  - "**/*.node"
  - "node_modules/better-sqlite3/**"
  - "node_modules/@anthropic-ai/claude-agent-sdk/**"

mac:
  category: public.app-category.developer-tools
  target:
    - dmg
  artifactName: ${productName}-${version}-${arch}.dmg
  # Sign with a local self-signed identity (see scripts/create-signing-cert.sh)
  # instead of ad-hoc. A stable signing identity gives the app a stable TCC
  # "designated requirement", so a one-time Full Disk Access grant survives
  # rebuilds (ad-hoc's cdhash changes every build and re-triggers prompts).
  # Not for distribution — Gatekeeper still warns on other Macs (no Developer ID
  # / notarization). `identity` is matched against the login keychain by name.
  identity: Atlas OS Local

dmg:
  artifactName: ${productName}-${version}-${arch}.dmg

# electron-updater config is generated from this block, but checkForUpdates() is
# never called (see README → TODO). Replace owner/repo and wire publishing later.
publish:
  provider: github
  owner: your-org
  repo: atlas-os
